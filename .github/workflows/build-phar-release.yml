---

on:  # yamllint disable-line rule:truthy
  release:
    types:
      - published

name: 📦 Build PHAR release

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      matrix:
        php-version:
          - '8.2'
        dependencies:
          - locked
    env:
      PHAR_PATH: ".build/phar/skills.phar"
      PHAR_SIGNATURE: ".build/phar/skills.phar.asc"
      GPG_KEYS: ".build/phar/keys.asc"
      GPG_KEYS_ENCRYPTED: ".github/phar/keys.asc.gpg"
    steps:
      - name: 📦 Check out the codebase
        uses: actions/checkout@v6

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          ini-values: error_reporting=E_ALL
          coverage: none
          tools: composer, box

      - name: 🛠️ Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"

      - name: 🤖 Validate composer.json and composer.lock
        run: composer validate --ansi --strict

      # The PHAR's standalone `bin/skills` needs composer/composer at runtime
      # (it bootstraps a Composer instance via Composer\Factory). In the
      # committed composer.json we keep composer/composer in `require-dev` so
      # plugin-mode users don't drag the whole Composer source tree along.
      # For the PHAR build we promote it into `require` so a `--no-dev`
      # install still includes it. The mutation is local to the CI runner.
      - name: 🔁 Promote composer/composer into require for the PHAR
        run: |
          composer config --unset require-dev.composer/composer
          composer require composer/composer:^2.9.0 --no-update --no-interaction --ansi

      - name: 📥 Install production dependencies
        run: composer update --no-dev --no-interaction --ansi --prefer-dist

      - name: 🔍 Validate configuration for box-project/box
        run: box validate box.json --ansi

      - name: 📦 Build PHAR
        run: box compile

      - name: 💥 Show info about skills.phar with box-project/box
        run: box info ${{ env.PHAR_PATH }} --ansi

      - name: 🤔 Run skills.phar help command
        run: ${{ env.PHAR_PATH }} --help

      - name: 🔍 Show gpg version
        run: gpg --version

      - name: 🔑 Decrypt keys.asc.gpg with gpg
        run: gpg --batch --output ${{ env.GPG_KEYS }} --passphrase "${{ secrets.GPG_DECRYPT_PASSPHRASE }}" --yes --decrypt ${{ env.GPG_KEYS_ENCRYPTED }}

      - name: 📥 Import keys from keys.asc with gpg
        run: gpg --batch --import ${{ env.GPG_KEYS }}

      - name: 🔐 Sign skills.phar with gpg
        run: gpg --armor --local-user "${{ secrets.GPG_LOCAL_USER }}" --output ${{ env.PHAR_SIGNATURE }} --passphrase "${{ secrets.GPG_KEY_PASSPHRASE }}" --pinentry-mode loopback --yes --detach-sig ${{ env.PHAR_PATH }}

      - name: ❎ Remove decrypted keys.asc
        run: rm ${{ env.GPG_KEYS }}

      - name: 📤 Upload release assets
        uses: softprops/action-gh-release@v2.0.5
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: "${{ secrets.RELEASE_TOKEN }}"
          files: |
            ${{ env.PHAR_PATH }}
            ${{ env.PHAR_SIGNATURE }}
