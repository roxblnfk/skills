name: 🧪 Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  testing:
    name: Tests PHP${{ matrix.php-version }} (${{ matrix.dependencies }})
    runs-on: ubuntu-latest
    timeout-minutes: 4
    strategy:
      fail-fast: false
      matrix:
        php-version: [ '8.2', '8.3', '8.4' ]
        dependencies: [ lowest, highest ]
    steps:
      - name: 📦 Check out the codebase
        uses: actions/checkout@v6

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: 📥 Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          dependency-versions: ${{ matrix.dependencies }}

      - name: 🧪 Run tests
        run: composer test:ci

      - name: 📤 Upload coverage to Codecov
        if: matrix.php-version == '8.2' && matrix.dependencies == 'highest'
        uses: codecov/codecov-action@v4
        with:
          files: runtime/clover.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

  compile-phar:
    name: Compile PHAR
    runs-on: ubuntu-latest
    timeout-minutes: 4
    env:
      PHAR_PATH: ".build/phar/skills.phar"
    steps:
      - name: 📦 Check out the codebase
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          ini-values: 'memory_limit=-1, phar.readonly=0'
          coverage: none
          tools: composer, box

      # Mirror the release workflow: promote composer/composer to require so
      # the bundled `bin/skills` can actually bootstrap a Composer instance
      # at runtime. See build-phar-release.yml for the rationale.
      - name: 🔁 Promote composer/composer into require for the PHAR
        run: |
          composer config --unset require-dev.composer/composer
          composer require composer/composer:^2.9.0 --no-update --no-interaction --ansi

      - name: 📥 Install production dependencies
        run: composer update --no-dev --no-interaction --ansi --prefer-dist

      - name: 🔍 Validate box.json
        run: box validate box.json --ansi

      - name: 🤖 Compile PHAR
        run: box compile --ansi

      - name: 💥 Show PHAR info
        run: box info ${{ env.PHAR_PATH }} --ansi

      - name: 🤔 Run PHAR help
        run: ${{ env.PHAR_PATH }} --help
